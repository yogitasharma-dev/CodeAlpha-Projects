<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yogita's Premium Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --display-bg: rgba(15, 23, 42, 0.6);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.4);
    
    --btn-num: rgba(255, 255, 255, 0.05);
    --btn-num-hover: rgba(255, 255, 255, 0.12);
    --btn-op: rgba(99, 102, 241, 0.15);
    --btn-op-hover: rgba(99, 102, 241, 0.3);
    --btn-op-text: #818cf8;
    --btn-clear: rgba(239, 68, 68, 0.15);
    --btn-clear-hover: rgba(239, 68, 68, 0.3);
    --btn-clear-text: #f87171;
  }

  body {
    min-height: 100vh;
    background: var(--bg-gradient);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Animated Background Orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    z-index: 0;
    animation: float 12s infinite alternate ease-in-out;
  }
  .orb-1 { width: 400px; height: 400px; background: #4f46e5; top: -10%; left: -10%; }
  .orb-2 { width: 500px; height: 500px; background: #c084fc; bottom: -10%; right: -10%; animation-delay: -4s; }

  @keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(50px, 30px) scale(1.1); }
  }

  .wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .label {
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }

  .calc {
    width: 350px;
    border-radius: 32px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    overflow: hidden;
    padding: 1.2rem;
  }

  /* Display */
  .display {
    background: var(--display-bg);
    border-radius: 20px;
    padding: 1.5rem;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    border: 1px solid var(--glass-border);
    margin-bottom: 1.2rem;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
  }

  #history-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
    text-align: right;
    min-height: 1.2rem;
    margin-bottom: 0.3rem;
  }

  #expression {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: var(--btn-op-text);
    text-align: right;
    min-height: 1.2rem;
    margin-bottom: 0.3rem;
    font-weight: 600;
  }

  #display-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--text-main);
    text-align: right;
    letter-spacing: -0.02em;
    line-height: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #display-value.small { font-size: 1.7rem; }

  /* Keypad */
  .keypad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.7rem;
  }

  .btn {
    border: 1px solid transparent;
    border-radius: 16px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    color: var(--text-main);
    user-select: none;
    position: relative;
    outline: none;
  }

  .btn-num { background: var(--btn-num); border-color: rgba(255,255,255,0.02); }
  .btn-num:hover { background: var(--btn-num-hover); border-color: rgba(255,255,255,0.08); }

  .btn-op { background: var(--btn-op); color: var(--btn-op-text); }
  .btn-op:hover { background: var(--btn-op-hover); }

  .btn-clear { background: var(--btn-clear); color: var(--btn-clear-text); }
  .btn-clear:hover { background: var(--btn-clear-hover); }

  .btn-eq {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 8px 24px var(--accent-glow);
    font-weight: 800;
  }
  .btn-eq:hover { 
    background: #4f46e5; 
    box-shadow: 0 12px 30px rgba(99, 102, 241, 0.6);
  }

  .hint {
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-align: center;
    margin-top: 1rem;
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrapper">
  <span class="label">Yogita's Premium Calculator</span>

  <div class="calc">
    <div class="display">
      <div id="history-line"></div>
      <div id="expression"></div>
      <div id="display-value">0</div>
    </div>

    <div class="keypad">
      <!-- Row 1 -->
      <button class="btn btn-clear" data-action="clear">AC</button>
      <button class="btn btn-op"    data-action="backspace">⌫</button>
      <button class="btn btn-op"    data-action="sqrt">√</button>
      <button class="btn btn-op"    data-action="op" data-op="÷">÷</button>

      <!-- Row 2 -->
      <button class="btn btn-num" data-action="num" data-val="7">7</button>
      <button class="btn btn-num" data-action="num" data-val="8">8</button>
      <button class="btn btn-num" data-action="num" data-val="9">9</button>
      <button class="btn btn-op"    data-action="op" data-op="×">×</button>

      <!-- Row 3 -->
      <button class="btn btn-num" data-action="num" data-val="4">4</button>
      <button class="btn btn-num" data-action="num" data-val="5">5</button>
      <button class="btn btn-num" data-action="num" data-val="6">6</button>
      <button class="btn btn-op"    data-action="op" data-op="−">−</button>

      <!-- Row 4 -->
      <button class="btn btn-num" data-action="num" data-val="1">1</button>
      <button class="btn btn-num" data-action="num" data-val="2">2</button>
      <button class="btn btn-num" data-action="num" data-val="3">3</button>
      <button class="btn btn-op"    data-action="op" data-op="+">+</button>

      <!-- Row 5 -->
      <button class="btn btn-num" data-action="num" data-val="0">0</button>
      <button class="btn btn-num" data-action="decimal">.</button>
      <button class="btn btn-op"    data-action="sqr">x²</button>
      <button class="btn btn-eq"    data-action="equals">=</button>
    </div>

    <p class="hint">Haptic Sound & Color Active</p>
  </div>
</div>

<script>
let current = '0';
let stored = null;
let operator = null;
let justCalc = false;
let expression = '';
let history = '';

const display = document.getElementById('display-value');
const exprEl = document.getElementById('expression');
const histEl = document.getElementById('history-line');

// Web Audio API for soft click sound
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playClickSound() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(550, audioCtx.currentTime); 
  osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.04);
  gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.04);
}

// Function to generate random color wave on click
function applyColorEffect(element) {
  const colors = ['#cffafe', '#a7f3d0', '#fef08a', '#fbcfe8', '#e9d5ff', '#fed7aa', '#6366f1'];
  const randomColor = colors[Math.floor(Math.random() * colors.length)];
  
  element.style.transform = 'scale(0.92)';
  element.style.boxShadow = `0 0 20px ${randomColor}`;
  element.style.borderColor = randomColor;
  
  setTimeout(() => {
    element.style.transform = '';
    element.style.boxShadow = '';
    element.style.borderColor = '';
  }, 180);
}

function updateDisplay() {
  let val = current;
  if (val.includes('.') && val.length > 10) {
    val = parseFloat(val).toPrecision(8).replace(/\.?0+$/, '');
  }
  display.textContent = val;
  display.classList.toggle('small', val.length > 10);
  exprEl.textContent = expression;
  histEl.textContent = history;
}

function inputNumber(val) {
  if (justCalc) { current = val; expression = ''; justCalc = false; return; }
  if (current === '0' && val !== '.') { current = val; }
  else if (val === '.' && current.includes('.')) { return; }
  else { current += val; }
}

function inputOperator(op) {
  if (operator && !justCalc) calculate(false);
  stored = parseFloat(current);
  operator = op;
  expression = `${current} ${op}`;
  justCalc = false;
  current = '0';
}

function calculate(final = true) {
  if (stored === null || operator === null) return;
  const a = stored;
  const b = parseFloat(current);
  let result;
  const expr = `${a} ${operator} ${b}`;

  switch (operator) {
    case '+': result = a + b; break;
    case '−': result = a - b; break;
    case '×': result = a * b; break;
    case '÷':
      if (b === 0) { current = 'Error'; expression = ''; stored = null; operator = null; return; }
      result = a / b;
      break;
  }

  if (final) {
    history = `${expr} =`;
    expression = '';
  }
  current = String(parseFloat(result.toPrecision(12)));
  stored = null;
  operator = null;
  justCalc = true;
}

document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    playClickSound();
    applyColorEffect(btn);
    const action = btn.dataset.action;
    if (action === 'num') inputNumber(btn.dataset.val);
    else if (action === 'op') inputOperator(btn.dataset.op);
    else if (action === 'equals') calculate();
    else if (action === 'clear') { current = '0'; stored = null; operator = null; justCalc = false; expression = ''; history = ''; }
    else if (action === 'backspace') { current = current.length > 1 ? current.slice(0, -1) : '0'; }
    else if (action === 'decimal') inputNumber('.');
    else if (action === 'sqr') { history = `sqr(${current})`; current = String(Math.pow(parseFloat(current), 2)); justCalc = true; }
    else if (action === 'sqrt') { 
      if(parseFloat(current) < 0) { current = 'Error'; } 
      else { history = `√(${current})`; current = String(Math.sqrt(parseFloat(current))); }
      justCalc = true;
    }
    updateDisplay();
  });
});

updateDisplay();
</script>
</body>
</html>
